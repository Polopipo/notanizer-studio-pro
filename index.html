<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notanizer Studio Pro - Edición Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card-bg: #1e293b; --accent: #38bdf8;
            --text-main: #f1f5f9; --text-dim: #94a3b8; --success: #10b981;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 1400px; padding: 20px; display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .sidebar { display: flex; flex-direction: column; gap: 15px; height: calc(100vh - 40px); overflow-y: auto; padding-right: 10px; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.05); }
        h1 { font-size: 1.3rem; margin: 0; color: var(--accent); }
        h3 { font-size: 0.8rem; text-transform: uppercase; color: var(--text-dim); margin: 15px 0 10px 0; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        .control-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: var(--text-dim); }
        select, input[type="file"], input[type="number"], input[type="text"] {
            width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: white; box-sizing: border-box;
        }
        input[type="range"] { width: 100%; accent-color: var(--accent); }
        .preview-area { display: flex; align-items: center; justify-content: center; background: #000; border-radius: 12px; overflow: hidden; }
        canvas { max-width: 100%; max-height: 85vh; object-fit: contain; }
        .btn-export {
            background: var(--success); color: white; border: none; padding: 16px; border-radius: 10px;
            font-weight: 700; cursor: pointer; width: 100%; transition: 0.2s; font-size: 1rem;
        }
        .btn-export:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .flex-row { display: flex; align-items: center; gap: 10px; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.85rem; color: var(--text-main); margin-top: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="card">
            <h1>Notanizer Studio</h1>
            <input type="file" id="upload" accept="image/*" style="margin-top:10px;">
        </div>

        <div class="card">
            <h3>1. Análisis Tonal</h3>
            <div class="control-group">
                <label>Niveles</label>
                <select id="numLevels">
                    <option value="2">2 Niveles</option>
                    <option value="3">3 Niveles</option>
                    <option value="4" selected>4 Niveles</option>
                </select>
            </div>
            <div id="thresholdContainer"></div>
        </div>

        <div class="card">
            <h3>2. Datos del Estudio</h3>
            <div class="control-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="enableText" checked> Incluir textos en PDF
                </label>
            </div>
            <div id="textFields">
                <div class="control-group">
                    <label>Título del estudio</label>
                    <input type="text" id="pdfTitle" placeholder="Ej: Composición I">
                </div>
                <div class="control-group">
                    <label>Artista</label>
                    <input type="text" id="pdfArtist" placeholder="Tu nombre">
                </div>
            </div>
        </div>

        <div class="card">
            <h3>3. Configuración PDF</h3>
            <div class="control-group">
                <div class="flex-row">
                    <select id="paperSize"><option value="a4">A4</option><option value="a3">A3</option><option value="a5">A5</option></select>
                    <select id="orientation"><option value="p">Vert.</option><option value="l">Horiz.</option></select>
                </div>
            </div>
            <div class="control-group">
                <label>Escala: <span id="scaleLabel">80%</span></label>
                <input type="range" id="imgScale" min="10" max="100" value="80">
            </div>
            <div class="control-group">
                <label>Margen guías (mm)</label>
                <input type="number" id="cropOffset" value="5">
            </div>
            <div class="control-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="showCropMarks" checked> Guías de corte
                </label>
            </div>
            <button class="btn-export" id="exportPdf">Exportar PDF</button>
        </div>
    </div>

    <div class="preview-area">
        <canvas id="canvas"></canvas>
    </div>
</div>

<script>
    const upload = document.getElementById('upload');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const numLevelsSelect = document.getElementById('numLevels');
    const thresholdContainer = document.getElementById('thresholdContainer');
    const scaleSlider = document.getElementById('imgScale');
    const scaleLabel = document.getElementById('scaleLabel');
    const exportBtn = document.getElementById('exportPdf');
    const enableText = document.getElementById('enableText');
    const textFields = document.getElementById('textFields');

    let imgElement = null;
    let thresholds = [];

    // Mostrar/ocultar inputs de texto según el checkbox
    enableText.onchange = () => {
        textFields.style.opacity = enableText.checked ? "1" : "0.3";
        textFields.querySelectorAll('input').forEach(i => i.disabled = !enableText.checked);
    };

    scaleSlider.oninput = () => scaleLabel.innerText = `${scaleSlider.value}%`;

    function updateSliders() {
        const n = parseInt(numLevelsSelect.value);
        thresholdContainer.innerHTML = ''; thresholds = [];
        for (let i = 1; i < n; i++) {
            const val = Math.floor((255 / n) * i);
            thresholds.push(val);
            const div = document.createElement('div');
            div.className = 'control-group';
            div.innerHTML = `<label>Umbral ${i}: <span id="v${i-1}">${val}</span></label>
                             <input type="range" min="0" max="255" value="${val}" data-index="${i-1}">`;
            thresholdContainer.appendChild(div);
        }
        thresholdContainer.querySelectorAll('input').forEach(input => {
            input.oninput = (e) => {
                const idx = e.target.dataset.index;
                thresholds[idx] = parseInt(e.target.value);
                document.getElementById(`v${idx}`).innerText = e.target.value;
                applyNotan();
            };
        });
        applyNotan();
    }

    upload.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            imgElement = new Image();
            imgElement.onload = () => {
                canvas.width = imgElement.width; canvas.height = imgElement.height;
                updateSliders();
            };
            imgElement.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    numLevelsSelect.onchange = updateSliders;

    function applyNotan() {
        if (!imgElement) return;
        ctx.drawImage(imgElement, 0, 0);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        const n = parseInt(numLevelsSelect.value);
        const colors = [];
        for(let i=0; i<n; i++) colors.push(Math.floor((255/(n-1))*i));
        const sortedT = [...thresholds].sort((a,b)=>a-b);

        for (let i = 0; i < data.length; i += 4) {
            const lum = data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
            let c = colors[n-1];
            for(let j=0; j<sortedT.length; j++) { if(lum < sortedT[j]) { c = colors[j]; break; } }
            data[i] = data[i+1] = data[i+2] = c;
        }
        ctx.putImageData(imgData, 0, 0);
    }

    exportBtn.onclick = () => {
        if (!imgElement) return alert("Sube una imagen");
        const { jsPDF } = window.jspdf;
        const format = document.getElementById('paperSize').value;
        const orient = document.getElementById('orientation').value;
        const scale = parseInt(scaleSlider.value) / 100;
        const offset = parseFloat(document.getElementById('cropOffset').value);
        const hasCrop = document.getElementById('showCropMarks').checked;
        const isTextEnabled = enableText.checked;

        const pdf = new jsPDF({ orientation: orient, unit: 'mm', format: format });
        const pW = pdf.internal.pageSize.getWidth();
        const pH = pdf.internal.pageSize.getHeight();
        
        let printW = pW * scale;
        let printH = (canvas.height * printW) / canvas.width;
        
        // Espacio para texto si está activado
        const textSpace = isTextEnabled ? 30 : 0;

        if (printH > (pH - textSpace - 20) * scale) {
            printH = (pH - textSpace - 20) * scale;
            printW = (canvas.width * printH) / canvas.height;
        }

        const x = (pW - printW) / 2;
        const y = (pH - printH) / 2 - (isTextEnabled ? 10 : 0);

        // Guías de corte
        if(hasCrop) {
            pdf.setDrawColor(180); pdf.setLineWidth(0.1);
            const s = 4; const o = offset;
            pdf.line(x-o, y, x-o-s, y); pdf.line(x, y-o, x, y-o-s);
            pdf.line(x+printW+o, y, x+printW+o+s, y); pdf.line(x+printW, y-o, x+printW, y-o-s);
            pdf.line(x-o, y+printH, x-o-s, y+printH); pdf.line(x, y+printH+o, x, y+printH+o+s);
            pdf.line(x+printW+o, y+printH, x+printW+o+s, y+printH); pdf.line(x+printW, y+printH+o, x+printW, y+printH+o+s);
        }

        pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', x, y, printW, printH);

        // Solo añadir texto si el checkbox está marcado
        if(isTextEnabled) {
            const title = document.getElementById('pdfTitle').value;
            const artist = document.getElementById('pdfArtist').value;
            pdf.setFont("helvetica", "bold");
            pdf.setFontSize(11);
            pdf.setTextColor(60);
            const textY = y + printH + 10;
            if(title) pdf.text(title, pW/2, textY, { align: 'center' });
            
            pdf.setFont("helvetica", "normal");
            pdf.setFontSize(8);
            pdf.setTextColor(120);
            let subText = (artist ? `Artista: ${artist}  |  ` : "") + `Fecha: ${new Date().toLocaleDateString()}`;
            pdf.text(subText, pW/2, textY + 5, { align: 'center' });
        }

        pdf.save("estudio-notan.pdf");
    };
        // Deshabilitar clic derecho
document.addEventListener('contextmenu', event => event.preventDefault());

// Deshabilitar teclas comunes de inspección (F12, Ctrl+Shift+I)
document.onkeydown = function(e) {
    if(e.keyCode == 123) return false; // F12
    if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
    if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
    if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ver código fuente
};
</script>

</body>
</html>
